name: Deploy to Firebase Hosting

on:
  push:
    branches: ["main"]

# ⚠️ USER ACTION REQUIRED:
# Generate a Firebase CI token: npx firebase-tools login:ci
# Add it as a GitHub secret named FIREBASE_TOKEN:
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate static tree
        run: npm run build

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project chess-club-hub-4cd54 --non-interactive
